<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Simplified Italianate building silhouette -->
  <!-- Chimneys -->
  <rect x="42" y="4" width="4" height="10" rx="0.5" fill="#B8956A"/>
  <rect x="49" y="6" width="3.5" height="8" rx="0.5" fill="#B8956A"/>
  <!-- Cornice/eave overhang -->
  <rect x="9" y="13" width="46" height="3" rx="0.5" fill="#B8956A"/>
  <!-- Building body -->
  <rect x="12" y="16" width="40" height="36" fill="#2C2C2C"/>
  <!-- Entry porch -->
  <rect x="14" y="40" width="8" height="12" fill="#2C2C2C"/>
  <rect x="13" y="38" width="10" height="2.5" rx="0.5" fill="#B8956A"/>
  <!-- Arched windows - upper row -->
  <rect x="22" y="20" width="4" height="10" rx="2" fill="#FAF7F2"/>
  <rect x="30" y="20" width="4" height="10" rx="2" fill="#FAF7F2"/>
  <rect x="38" y="20" width="4" height="10" rx="2" fill="#FAF7F2"/>
  <!-- Arched windows - lower row -->
  <rect x="22" y="36" width="4" height="10" rx="2" fill="#FAF7F2"/>
  <rect x="30" y="36" width="4" height="10" rx="2" fill="#FAF7F2"/>
  <rect x="38" y="36" width="4" height="10" rx="2" fill="#FAF7F2"/>
  <!-- Door -->
  <rect x="16" y="43" width="4" height="9" rx="2" fill="#FAF7F2"/>
  <!-- Cornice brackets (decorative) -->
  <rect x="16" y="14" width="2" height="2" fill="#2C2C2C"/>
  <rect x="24" y="14" width="2" height="2" fill="#2C2C2C"/>
  <rect x="32" y="14" width="2" height="2" fill="#2C2C2C"/>
  <rect x="40" y="14" width="2" height="2" fill="#2C2C2C"/>
  <rect x="48" y="14" width="2" height="2" fill="#2C2C2C"/>
  <!-- Ground line -->
  <rect x="8" y="52" width="50" height="1.5" rx="0.5" fill="#B8956A" opacity="0.4"/>
</svg>
